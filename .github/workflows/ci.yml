name: CI

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Lint workflows
        uses: rhysd/actionlint@v1.7.12

      - name: Check ops shell syntax
        shell: bash
        run: bash -n ops/*.sh

  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.3
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native dependencies
        run: pnpm rebuild better-sqlite3

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Smoke local release wrapper flow
        env:
          RELEASE_BUNDLE_DIR: ${{ runner.temp }}/promobot-release
          RELEASE_ARCHIVE_PATH: ${{ runner.temp }}/promobot-release.tar.gz
          RELEASE_CHECKSUM_PATH: ${{ runner.temp }}/promobot-release.tar.gz.sha256
          RELEASE_METADATA_PATH: ${{ runner.temp }}/promobot-release.tar.gz.metadata.json
          RELEASE_HELPER_PATH: ${{ runner.temp }}/verify-downloaded-release.sh
        run: |
          rm -rf "$RELEASE_BUNDLE_DIR"
          rm -f "$RELEASE_ARCHIVE_PATH" "$RELEASE_CHECKSUM_PATH" "$RELEASE_METADATA_PATH" "$RELEASE_HELPER_PATH"
          pnpm release:local -- --skip-build --output-dir "$RELEASE_BUNDLE_DIR"
          test -f "$RELEASE_BUNDLE_DIR/manifest.json"
          test -f "$RELEASE_ARCHIVE_PATH"
          test -f "$RELEASE_CHECKSUM_PATH"
          test -f "$RELEASE_METADATA_PATH"
          test -x "$RELEASE_HELPER_PATH"
