name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Lint workflows
        uses: rhysd/actionlint@v1.7.12

      - name: Check ops shell syntax
        shell: bash
        run: bash -n ops/*.sh

  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.3
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Smoke release bundle flow
        env:
          RELEASE_BUNDLE_DIR: ${{ runner.temp }}/promobot-release
        run: |
          rm -rf "$RELEASE_BUNDLE_DIR"
          node dist/server/cli/releaseBundle.js --output-dir "$RELEASE_BUNDLE_DIR"
          bash "$RELEASE_BUNDLE_DIR/ops/verify-release.sh" --input-dir "$RELEASE_BUNDLE_DIR"
