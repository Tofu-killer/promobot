name: Release Bundle

on:
  workflow_dispatch:
    inputs:
      asset_suffix:
        description: "Optional preview suffix (1-32 chars: lowercase letters, digits, ., _, -; must start and end with a letter or digit)"
        required: false
        type: string
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: false

permissions: {}

jobs:
  release-bundle:
    name: Build release bundle artifact
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    outputs:
      artifact_name: ${{ steps.asset_names.outputs.artifact_name }}
      asset_basename: ${{ steps.asset_names.outputs.asset_basename }}
      bundle_dir_name: ${{ steps.asset_names.outputs.bundle_dir_name }}
      archive_file: ${{ steps.asset_names.outputs.archive_file }}
      checksum_file: ${{ steps.asset_names.outputs.checksum_file }}
      metadata_file: ${{ steps.asset_names.outputs.metadata_file }}
    env:
      ASSET_NAME_ROOT: promobot-release-bundle
      BUNDLE_ROOT: ${{ runner.temp }}/release-artifacts
      BUNDLE_DIR_NAME: promobot-release-bundle

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Run static preflight
        run: node dist/server/cli/preflightPromobot.js --repo-root "$GITHUB_WORKSPACE"

      - name: Derive release bundle asset names
        id: asset_names
        env:
          RAW_ASSET_SUFFIX: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.asset_suffix || '' }}
        run: |
          NAME_SOURCE="$ASSET_NAME_ROOT"
          ASSET_SUFFIX="${RAW_ASSET_SUFFIX:-}"
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ] && [ -n "${GITHUB_REF_NAME:-}" ]; then
            NAME_SOURCE="${ASSET_NAME_ROOT}-${GITHUB_REF_NAME}"
          elif [ "${GITHUB_EVENT_NAME:-}" = "workflow_dispatch" ] && [ -n "$ASSET_SUFFIX" ]; then
            if [[ ! "$ASSET_SUFFIX" =~ ^[a-z0-9]([a-z0-9._-]{0,30}[a-z0-9])?$ ]]; then
              echo "asset_suffix must be 1-32 chars of lowercase letters, digits, '.', '_' or '-', and must start and end with a letter or digit." >&2
              exit 1
            fi
            NAME_SOURCE="${ASSET_NAME_ROOT}-${ASSET_SUFFIX}"
          fi
          ARTIFACT_NAME="${NAME_SOURCE}-artifact"
          ASSET_BASENAME="$NAME_SOURCE"
          BUNDLE_DIR="${BUNDLE_ROOT}/${BUNDLE_DIR_NAME}"
          ARCHIVE_FILE="${ASSET_BASENAME}.tar.gz"
          ARCHIVE_PATH="${BUNDLE_ROOT}/${ARCHIVE_FILE}"
          CHECKSUM_FILE="${ARCHIVE_FILE}.sha256"
          CHECKSUM_PATH="${BUNDLE_ROOT}/${CHECKSUM_FILE}"
          METADATA_FILE="${ARCHIVE_FILE}.metadata.json"
          METADATA_PATH="${BUNDLE_ROOT}/${METADATA_FILE}"
          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          echo "asset_basename=$ASSET_BASENAME" >> "$GITHUB_OUTPUT"
          echo "bundle_dir_name=$BUNDLE_DIR_NAME" >> "$GITHUB_OUTPUT"
          echo "bundle_dir=$BUNDLE_DIR" >> "$GITHUB_OUTPUT"
          echo "archive_file=$ARCHIVE_FILE" >> "$GITHUB_OUTPUT"
          echo "archive_path=$ARCHIVE_PATH" >> "$GITHUB_OUTPUT"
          echo "checksum_file=$CHECKSUM_FILE" >> "$GITHUB_OUTPUT"
          echo "checksum_path=$CHECKSUM_PATH" >> "$GITHUB_OUTPUT"
          echo "metadata_file=$METADATA_FILE" >> "$GITHUB_OUTPUT"
          echo "metadata_path=$METADATA_PATH" >> "$GITHUB_OUTPUT"

      - name: Generate release bundle
        env:
          BUNDLE_DIR: ${{ steps.asset_names.outputs.bundle_dir }}
        run: |
          mkdir -p "$BUNDLE_ROOT"
          node dist/server/cli/releaseBundle.js --output-dir "$BUNDLE_DIR"

      - name: Verify release bundle
        env:
          BUNDLE_DIR: ${{ steps.asset_names.outputs.bundle_dir }}
        run: node dist/server/cli/releaseVerify.js --input-dir "$BUNDLE_DIR"

      - name: Archive release bundle
        env:
          ARCHIVE_PATH: ${{ steps.asset_names.outputs.archive_path }}
          BUNDLE_DIR_NAME: ${{ steps.asset_names.outputs.bundle_dir_name }}
        run: |
          rm -f "$ARCHIVE_PATH"
          tar -czf "$ARCHIVE_PATH" -C "$BUNDLE_ROOT" "$BUNDLE_DIR_NAME"

      - name: Verify archived release bundle
        env:
          ARCHIVE_PATH: ${{ steps.asset_names.outputs.archive_path }}
          BUNDLE_DIR_NAME: ${{ steps.asset_names.outputs.bundle_dir_name }}
        run: |
          EXTRACT_ROOT="${RUNNER_TEMP}/release-archive-check"
          rm -rf "$EXTRACT_ROOT"
          mkdir -p "$EXTRACT_ROOT"
          tar -xzf "$ARCHIVE_PATH" -C "$EXTRACT_ROOT"
          node dist/server/cli/releaseVerify.js --input-dir "$EXTRACT_ROOT/$BUNDLE_DIR_NAME"

      - name: Generate archived release bundle checksum sidecar
        env:
          ARCHIVE_PATH: ${{ steps.asset_names.outputs.archive_path }}
          CHECKSUM_PATH: ${{ steps.asset_names.outputs.checksum_path }}
        run: |
          CHECKSUM_DIR="$(dirname "$CHECKSUM_PATH")"
          ARCHIVE_FILE="$(basename "$ARCHIVE_PATH")"
          CHECKSUM_FILE="$(basename "$CHECKSUM_PATH")"
          cd "$CHECKSUM_DIR"
          rm -f "$CHECKSUM_FILE"
          sha256sum "$ARCHIVE_FILE" > "$CHECKSUM_FILE"

      - name: Verify archived release bundle checksum sidecar
        env:
          CHECKSUM_PATH: ${{ steps.asset_names.outputs.checksum_path }}
        run: |
          CHECKSUM_DIR="$(dirname "$CHECKSUM_PATH")"
          cd "$CHECKSUM_DIR"
          sha256sum -c "$(basename "$CHECKSUM_PATH")"

      - name: Reset archived release bundle metadata file
        env:
          METADATA_PATH: ${{ steps.asset_names.outputs.metadata_path }}
        run: |
          rm -f "$METADATA_PATH"

      - name: Generate archived release bundle metadata
        env:
          ASSET_BASENAME: ${{ steps.asset_names.outputs.asset_basename }}
          ARCHIVE_FILE: ${{ steps.asset_names.outputs.archive_file }}
          CHECKSUM_FILE: ${{ steps.asset_names.outputs.checksum_file }}
          BUNDLE_DIR_NAME: ${{ steps.asset_names.outputs.bundle_dir_name }}
          METADATA_PATH: ${{ steps.asset_names.outputs.metadata_path }}
        run: |
          export ASSET_BASENAME ARCHIVE_FILE CHECKSUM_FILE BUNDLE_DIR_NAME
          node <<'EOF'
          const fs = require('node:fs');

          const metadata = {
            asset_basename: process.env.ASSET_BASENAME,
            ref: process.env.GITHUB_REF,
            ref_name: process.env.GITHUB_REF_NAME,
            ref_type: process.env.GITHUB_REF_TYPE,
            tag: process.env.GITHUB_REF_TYPE === 'tag' ? process.env.GITHUB_REF_NAME : null,
            commit_sha: process.env.GITHUB_SHA,
            archive_file: process.env.ARCHIVE_FILE,
            checksum_file: process.env.CHECKSUM_FILE,
            bundle_dir_name: process.env.BUNDLE_DIR_NAME,
          };

          fs.writeFileSync(process.env.METADATA_PATH, `${JSON.stringify(metadata, null, 2)}\n`);
          EOF

      - name: Verify archived release bundle metadata
        env:
          ASSET_BASENAME: ${{ steps.asset_names.outputs.asset_basename }}
          ARCHIVE_FILE: ${{ steps.asset_names.outputs.archive_file }}
          CHECKSUM_FILE: ${{ steps.asset_names.outputs.checksum_file }}
          BUNDLE_DIR_NAME: ${{ steps.asset_names.outputs.bundle_dir_name }}
          METADATA_PATH: ${{ steps.asset_names.outputs.metadata_path }}
        run: |
          export ASSET_BASENAME ARCHIVE_FILE CHECKSUM_FILE BUNDLE_DIR_NAME
          node <<'EOF'
          const fs = require('node:fs');

          const metadata = JSON.parse(fs.readFileSync(process.env.METADATA_PATH, 'utf8'));
          const expected = {
            asset_basename: process.env.ASSET_BASENAME,
            ref: process.env.GITHUB_REF,
            ref_name: process.env.GITHUB_REF_NAME,
            ref_type: process.env.GITHUB_REF_TYPE,
            tag: process.env.GITHUB_REF_TYPE === 'tag' ? process.env.GITHUB_REF_NAME : null,
            commit_sha: process.env.GITHUB_SHA,
            archive_file: process.env.ARCHIVE_FILE,
            checksum_file: process.env.CHECKSUM_FILE,
            bundle_dir_name: process.env.BUNDLE_DIR_NAME,
          };

          for (const [key, value] of Object.entries(expected)) {
            if (metadata[key] !== value) {
              throw new Error(`Unexpected metadata field ${key}: ${metadata[key]} !== ${value}`);
            }
          }
          EOF

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.asset_names.outputs.artifact_name }}
          path: |
            ${{ steps.asset_names.outputs.bundle_dir }}
            ${{ steps.asset_names.outputs.archive_path }}
            ${{ steps.asset_names.outputs.checksum_path }}
            ${{ steps.asset_names.outputs.metadata_path }}
          if-no-files-found: error
          compression-level: 0

      - name: Write workflow run summary
        env:
          ARTIFACT_NAME: ${{ steps.asset_names.outputs.artifact_name }}
          ARCHIVE_FILE: ${{ steps.asset_names.outputs.archive_file }}
          CHECKSUM_FILE: ${{ steps.asset_names.outputs.checksum_file }}
          METADATA_FILE: ${{ steps.asset_names.outputs.metadata_file }}
          BUNDLE_DIR_NAME: ${{ steps.asset_names.outputs.bundle_dir_name }}
          METADATA_PATH: ${{ steps.asset_names.outputs.metadata_path }}
        run: |
          export ARTIFACT_NAME ARCHIVE_FILE CHECKSUM_FILE METADATA_FILE BUNDLE_DIR_NAME METADATA_PATH
          node <<'EOF'
          const fs = require('node:fs');
          const path = require('node:path');

          const metadata = JSON.parse(fs.readFileSync(process.env.METADATA_PATH, 'utf8'));
          const metadataFile = path.basename(process.env.METADATA_PATH);

          if (metadata.archive_file !== process.env.ARCHIVE_FILE) {
            throw new Error(`Unexpected metadata archive_file: ${metadata.archive_file} !== ${process.env.ARCHIVE_FILE}`);
          }

          if (metadata.checksum_file !== process.env.CHECKSUM_FILE) {
            throw new Error(`Unexpected metadata checksum_file: ${metadata.checksum_file} !== ${process.env.CHECKSUM_FILE}`);
          }

          if (metadata.bundle_dir_name !== process.env.BUNDLE_DIR_NAME) {
            throw new Error(`Unexpected metadata bundle_dir_name: ${metadata.bundle_dir_name} !== ${process.env.BUNDLE_DIR_NAME}`);
          }

          if (metadataFile !== process.env.METADATA_FILE) {
            throw new Error(`Unexpected metadata file name: ${metadataFile} !== ${process.env.METADATA_FILE}`);
          }

          const isTagRelease = process.env.GITHUB_REF_TYPE === 'tag';
          const releasePageUrl = isTagRelease
            ? `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/releases/tag/${process.env.GITHUB_REF_NAME}`
            : null;

          const lines = [
            '## Release bundle run summary',
            '',
            `Generated asset set: \`${metadata.archive_file}\`, \`${metadata.checksum_file}\`, \`${metadataFile}\`.`,
            `Artifact container: \`${process.env.ARTIFACT_NAME}\`.`,
            '',
            'Recommended verification order:',
            `1. Run \`sha256sum -c ${metadata.checksum_file}\` before trusting \`${metadata.archive_file}\`.`,
            `2. Read \`${metadataFile}\` to confirm the ${isTagRelease ? 'tag' : 'ref'}, commit SHA, and asset-to-bundle mapping.`,
            `3. Extract \`${metadata.archive_file}\` with \`tar -xzf ${metadata.archive_file}\`.`,
            `4. Verify the extracted \`${metadata.bundle_dir_name}\` directory with \`pnpm release:verify -- --input-dir ./${metadata.bundle_dir_name}\` or \`pnpm verify:release -- --input-dir ./${metadata.bundle_dir_name}\`.`,
            '',
            isTagRelease
              ? `Next step: the publish job will attach the same files to the [GitHub Release page](${releasePageUrl}) for \`${process.env.GITHUB_REF_NAME}\`.`
              : `Next step: download the \`${process.env.ARTIFACT_NAME}\` artifact from this run and verify the files in the order above.`,
          ];

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${lines.join('\n')}\n`);
          EOF

  publish-release-asset:
    name: Publish release bundle release asset
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - release-bundle
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Download release bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.release-bundle.outputs.artifact_name }}
          path: ${{ runner.temp }}/release-bundle-artifact

      - name: Locate archived release bundle assets
        id: archive
        env:
          ARCHIVE_FILE: ${{ needs.release-bundle.outputs.archive_file }}
          CHECKSUM_FILE: ${{ needs.release-bundle.outputs.checksum_file }}
          METADATA_FILE: ${{ needs.release-bundle.outputs.metadata_file }}
        run: |
          ARCHIVE_PATH="$(find "${RUNNER_TEMP}/release-bundle-artifact" -type f -name "$ARCHIVE_FILE" -print -quit)"
          if [ -z "$ARCHIVE_PATH" ]; then
            echo "Expected $ARCHIVE_FILE in the downloaded release bundle artifact" >&2
            exit 1
          fi
          CHECKSUM_PATH="$(find "${RUNNER_TEMP}/release-bundle-artifact" -type f -name "$CHECKSUM_FILE" -print -quit)"
          if [ -z "$CHECKSUM_PATH" ]; then
            echo "Expected $CHECKSUM_FILE in the downloaded release bundle artifact" >&2
            exit 1
          fi
          METADATA_PATH="$(find "${RUNNER_TEMP}/release-bundle-artifact" -type f -name "$METADATA_FILE" -print -quit)"
          if [ -z "$METADATA_PATH" ]; then
            echo "Expected $METADATA_FILE in the downloaded release bundle artifact" >&2
            exit 1
          fi
          echo "archive_path=$ARCHIVE_PATH" >> "$GITHUB_OUTPUT"
          echo "checksum_path=$CHECKSUM_PATH" >> "$GITHUB_OUTPUT"
          echo "metadata_path=$METADATA_PATH" >> "$GITHUB_OUTPUT"

      - name: Generate GitHub Release body
        id: release_body
        env:
          ARCHIVE_PATH: ${{ steps.archive.outputs.archive_path }}
          CHECKSUM_PATH: ${{ steps.archive.outputs.checksum_path }}
          METADATA_PATH: ${{ steps.archive.outputs.metadata_path }}
          EXPECTED_ASSET_BASENAME: ${{ needs.release-bundle.outputs.asset_basename }}
          EXPECTED_BUNDLE_DIR_NAME: ${{ needs.release-bundle.outputs.bundle_dir_name }}
          RELEASE_BODY_PATH: ${{ runner.temp }}/release-body.md
        run: |
          export ARCHIVE_PATH CHECKSUM_PATH METADATA_PATH EXPECTED_ASSET_BASENAME EXPECTED_BUNDLE_DIR_NAME RELEASE_BODY_PATH
          node <<'EOF'
          const fs = require('node:fs');
          const path = require('node:path');

          const metadata = JSON.parse(fs.readFileSync(process.env.METADATA_PATH, 'utf8'));
          const archiveFile = path.basename(process.env.ARCHIVE_PATH);
          const checksumFile = path.basename(process.env.CHECKSUM_PATH);
          const metadataFile = path.basename(process.env.METADATA_PATH);
          const assetBasename = metadata.asset_basename;

          if (assetBasename !== process.env.EXPECTED_ASSET_BASENAME) {
            throw new Error(`Unexpected metadata asset_basename: ${assetBasename} !== ${process.env.EXPECTED_ASSET_BASENAME}`);
          }

          const expectedArchiveFile = `${assetBasename}.tar.gz`;
          const expectedChecksumFile = `${expectedArchiveFile}.sha256`;
          const expectedMetadataFile = `${expectedArchiveFile}.metadata.json`;

          if (archiveFile !== expectedArchiveFile) {
            throw new Error(`Unexpected archive file name: ${archiveFile} !== ${expectedArchiveFile}`);
          }

          if (metadata.archive_file !== archiveFile) {
            throw new Error(`Unexpected metadata archive_file: ${metadata.archive_file} !== ${archiveFile}`);
          }

          if (checksumFile !== expectedChecksumFile) {
            throw new Error(`Unexpected checksum file name: ${checksumFile} !== ${expectedChecksumFile}`);
          }

          if (metadata.checksum_file !== checksumFile) {
            throw new Error(`Unexpected metadata checksum_file: ${metadata.checksum_file} !== ${checksumFile}`);
          }

          if (metadataFile !== expectedMetadataFile) {
            throw new Error(`Unexpected metadata file name: ${metadataFile} !== ${expectedMetadataFile}`);
          }

          const bundleDirName = metadata.bundle_dir_name;
          if (!bundleDirName) {
            throw new Error('Expected bundle_dir_name in release metadata');
          }

          if (bundleDirName !== process.env.EXPECTED_BUNDLE_DIR_NAME) {
            throw new Error(`Unexpected bundle_dir_name: ${bundleDirName} !== ${process.env.EXPECTED_BUNDLE_DIR_NAME}`);
          }

          const body = [
            `Release bundle assets for ${process.env.GITHUB_REF_NAME}.`,
            '',
            'Download:',
            `- \`${expectedArchiveFile}\``,
            `- \`${expectedChecksumFile}\``,
            `- \`${expectedMetadataFile}\``,
            '',
            'Recommended verification flow:',
            `1. Run \`sha256sum -c ${expectedChecksumFile}\` before trusting \`${expectedArchiveFile}\`.`,
            `2. Read \`${expectedMetadataFile}\` to confirm the tag, commit SHA, and asset-to-bundle mapping.`,
            `3. Extract \`${expectedArchiveFile}\` with \`tar -xzf ${expectedArchiveFile}\`.`,
            `4. Verify the extracted \`${bundleDirName}\` directory with \`pnpm release:verify -- --input-dir ./${bundleDirName}\` or \`pnpm verify:release -- --input-dir ./${bundleDirName}\`.`,
            '',
            `The extracted directory name should match \`bundle_dir_name: ${bundleDirName}\` in \`${expectedMetadataFile}\`.`,
          ].join('\n');

          fs.writeFileSync(process.env.RELEASE_BODY_PATH, `${body}\n`);
          EOF
          echo "body_path=$RELEASE_BODY_PATH" >> "$GITHUB_OUTPUT"

      - name: Derive GitHub Release prerelease flag
        id: release_flags
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          is_prerelease=false
          if [[ "$TAG_NAME" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            is_prerelease=true
          fi
          echo "prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"

      - name: Publish archived release bundle assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.archive.outputs.archive_path }}
            ${{ steps.archive.outputs.checksum_path }}
            ${{ steps.archive.outputs.metadata_path }}
          body_path: ${{ steps.release_body.outputs.body_path }}
          prerelease: ${{ steps.release_flags.outputs.prerelease }}
          fail_on_unmatched_files: true
          overwrite_files: true

      - name: Write GitHub Release summary
        env:
          RELEASE_BODY_PATH: ${{ steps.release_body.outputs.body_path }}
          RELEASE_URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}
        run: |
          {
            echo "## GitHub Release publication"
            echo
            echo "Release page:"
            echo "- [${GITHUB_REF_NAME}](${RELEASE_URL})"
            echo
            echo "Next step: use the Release page above; the notes below are the exact body published for this tag."
            echo
            echo "Release page notes:"
            cat "$RELEASE_BODY_PATH"
          } >> "$GITHUB_STEP_SUMMARY"
