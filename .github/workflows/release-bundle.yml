name: Release Bundle

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release-bundle:
    name: Build release bundle artifact
    runs-on: ubuntu-latest
    env:
      ARTIFACT_NAME: promobot-release-bundle
      BUNDLE_ROOT: ${{ runner.temp }}/release-artifacts
      BUNDLE_DIR: ${{ runner.temp }}/release-artifacts/promobot-release-bundle
      ARCHIVE_PATH: ${{ runner.temp }}/release-artifacts/promobot-release-bundle.tar.gz
      CHECKSUM_PATH: ${{ runner.temp }}/release-artifacts/promobot-release-bundle.tar.gz.sha256

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Run static preflight
        run: node dist/server/cli/preflightPromobot.js --repo-root "$GITHUB_WORKSPACE"

      - name: Generate release bundle
        run: |
          mkdir -p "$BUNDLE_ROOT"
          node dist/server/cli/releaseBundle.js --output-dir "$BUNDLE_DIR"

      - name: Verify release bundle
        run: node dist/server/cli/releaseVerify.js --input-dir "$BUNDLE_DIR"

      - name: Archive release bundle
        run: |
          rm -f "$ARCHIVE_PATH"
          tar -czf "$ARCHIVE_PATH" -C "$BUNDLE_ROOT" "$ARTIFACT_NAME"

      - name: Verify archived release bundle
        run: |
          EXTRACT_ROOT="${RUNNER_TEMP}/release-archive-check"
          rm -rf "$EXTRACT_ROOT"
          mkdir -p "$EXTRACT_ROOT"
          tar -xzf "$ARCHIVE_PATH" -C "$EXTRACT_ROOT"
          node dist/server/cli/releaseVerify.js --input-dir "$EXTRACT_ROOT/$ARTIFACT_NAME"

      - name: Generate archived release bundle checksum sidecar
        run: |
          CHECKSUM_DIR="$(dirname "$CHECKSUM_PATH")"
          ARCHIVE_FILE="$(basename "$ARCHIVE_PATH")"
          CHECKSUM_FILE="$(basename "$CHECKSUM_PATH")"
          cd "$CHECKSUM_DIR"
          rm -f "$CHECKSUM_FILE"
          sha256sum "$ARCHIVE_FILE" > "$CHECKSUM_FILE"

      - name: Verify archived release bundle checksum sidecar
        run: |
          CHECKSUM_DIR="$(dirname "$CHECKSUM_PATH")"
          cd "$CHECKSUM_DIR"
          sha256sum -c "$(basename "$CHECKSUM_PATH")"

      - name: Derive archived release bundle metadata path
        id: metadata
        run: |
          METADATA_FILE="$(basename "$ARCHIVE_PATH").metadata.json"
          METADATA_PATH="$(dirname "$ARCHIVE_PATH")/$METADATA_FILE"
          rm -f "$METADATA_PATH"
          echo "metadata_file=$METADATA_FILE" >> "$GITHUB_OUTPUT"
          echo "metadata_path=$METADATA_PATH" >> "$GITHUB_OUTPUT"

      - name: Generate archived release bundle metadata
        env:
          METADATA_PATH: ${{ steps.metadata.outputs.metadata_path }}
        run: |
          ARCHIVE_FILE="$(basename "$ARCHIVE_PATH")"
          CHECKSUM_FILE="$(basename "$CHECKSUM_PATH")"
          BUNDLE_DIR_NAME="$(basename "$BUNDLE_DIR")"
          export ARCHIVE_FILE CHECKSUM_FILE BUNDLE_DIR_NAME
          node <<'EOF'
          const fs = require('node:fs');

          const metadata = {
            ref: process.env.GITHUB_REF,
            ref_name: process.env.GITHUB_REF_NAME,
            ref_type: process.env.GITHUB_REF_TYPE,
            tag: process.env.GITHUB_REF_TYPE === 'tag' ? process.env.GITHUB_REF_NAME : null,
            commit_sha: process.env.GITHUB_SHA,
            archive_file: process.env.ARCHIVE_FILE,
            checksum_file: process.env.CHECKSUM_FILE,
            bundle_dir_name: process.env.BUNDLE_DIR_NAME,
          };

          fs.writeFileSync(process.env.METADATA_PATH, `${JSON.stringify(metadata, null, 2)}\n`);
          EOF

      - name: Verify archived release bundle metadata
        env:
          METADATA_PATH: ${{ steps.metadata.outputs.metadata_path }}
        run: |
          ARCHIVE_FILE="$(basename "$ARCHIVE_PATH")"
          CHECKSUM_FILE="$(basename "$CHECKSUM_PATH")"
          BUNDLE_DIR_NAME="$(basename "$BUNDLE_DIR")"
          export ARCHIVE_FILE CHECKSUM_FILE BUNDLE_DIR_NAME
          node <<'EOF'
          const fs = require('node:fs');

          const metadata = JSON.parse(fs.readFileSync(process.env.METADATA_PATH, 'utf8'));
          const expected = {
            ref: process.env.GITHUB_REF,
            ref_name: process.env.GITHUB_REF_NAME,
            ref_type: process.env.GITHUB_REF_TYPE,
            tag: process.env.GITHUB_REF_TYPE === 'tag' ? process.env.GITHUB_REF_NAME : null,
            commit_sha: process.env.GITHUB_SHA,
            archive_file: process.env.ARCHIVE_FILE,
            checksum_file: process.env.CHECKSUM_FILE,
            bundle_dir_name: process.env.BUNDLE_DIR_NAME,
          };

          for (const [key, value] of Object.entries(expected)) {
            if (metadata[key] !== value) {
              throw new Error(`Unexpected metadata field ${key}: ${metadata[key]} !== ${value}`);
            }
          }
          EOF

      - name: Upload release bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: promobot-release-bundle
          path: |
            ${{ env.BUNDLE_DIR }}
            ${{ env.ARCHIVE_PATH }}
            ${{ env.CHECKSUM_PATH }}
            ${{ steps.metadata.outputs.metadata_path }}
          if-no-files-found: error
          compression-level: 0

  publish-release-asset:
    name: Publish release bundle release asset
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - release-bundle
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: promobot-release-bundle
          path: ${{ runner.temp }}/release-bundle-artifact

      - name: Locate archived release bundle assets
        id: archive
        run: |
          ARCHIVE_PATH="$(find "${RUNNER_TEMP}/release-bundle-artifact" -type f -name '*.tar.gz' -print -quit)"
          if [ -z "$ARCHIVE_PATH" ]; then
            echo "Expected a .tar.gz archive in the downloaded release bundle artifact" >&2
            exit 1
          fi
          CHECKSUM_PATH="$(find "${RUNNER_TEMP}/release-bundle-artifact" -type f -name "$(basename "$ARCHIVE_PATH").sha256" -print -quit)"
          if [ -z "$CHECKSUM_PATH" ]; then
            echo "Expected a .sha256 sidecar next to the archived release bundle" >&2
            exit 1
          fi
          METADATA_PATH="$(find "${RUNNER_TEMP}/release-bundle-artifact" -type f -name "$(basename "$ARCHIVE_PATH").metadata.json" -print -quit)"
          if [ -z "$METADATA_PATH" ]; then
            echo "Expected a .metadata.json sidecar next to the archived release bundle" >&2
            exit 1
          fi
          echo "archive_path=$ARCHIVE_PATH" >> "$GITHUB_OUTPUT"
          echo "checksum_path=$CHECKSUM_PATH" >> "$GITHUB_OUTPUT"
          echo "metadata_path=$METADATA_PATH" >> "$GITHUB_OUTPUT"

      - name: Publish archived release bundle assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.archive.outputs.archive_path }}
            ${{ steps.archive.outputs.checksum_path }}
            ${{ steps.archive.outputs.metadata_path }}
          fail_on_unmatched_files: true
          overwrite_files: true
